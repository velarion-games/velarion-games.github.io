<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Velarion Games</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
      color: #1a1a1a;
      background: #fafafa;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      text-align: center;
      max-width: 32rem;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .intro {
      margin: 0 0 1.5rem;
      color: #444;
      font-size: 1rem;
    }

    .form-wrap {
      width: 100%;
      margin-bottom: 1.5rem;
    }

    .social-section {
      margin-top: 0.25rem;
    }

    .follow-label {
      margin: 0 0 0.75rem;
      font-size: 0.9rem;
      color: #555;
    }

    .social {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .social a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.375rem;
      transition: background-color 0.15s ease;
    }

    .social a:hover {
      background-color: #eee;
    }

    .social img {
      display: block;
      width: 1.5rem;
      height: 1.5rem;
      object-fit: contain;
    }

    .social a[href*="discord"] img {
      width: 1.75rem;
      height: 1.35rem;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Velarion Games</h1>
    <p class="intro">
      Sign up to stay in touch with our development journey.<br>
      We'll never send more than one email per month.
    </p>
    <div class="form-wrap">
      <script async src="https://eocampaign1.com/form/dd664804-c17a-11f0-a78e-09db77d996a6.js"
        data-form="dd664804-c17a-11f0-a78e-09db77d996a6"></script>
    </div>
    <section class="social-section" aria-labelledby="follow-label">
      <p id="follow-label" class="follow-label">follow us on</p>
      <nav class="social" aria-label="Social links">
        <a href="https://x.com/VelarionGames" rel="noopener noreferrer" aria-label="Velarion Games on X">
          <img src="assets/x-logo.png" alt="" width="24" height="24">
        </a>
        <a href="https://discord.gg/VWsafFcXDW" rel="noopener noreferrer" aria-label="Velarion Games on Discord">
          <img src="assets/discord-symbol.svg" alt="" width="28" height="22">
        </a>
      </nav>
    </section>
  </main>
</body>
</html>
